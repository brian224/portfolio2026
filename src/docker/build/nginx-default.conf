server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    client_max_body_size 10M;
    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        # add_header 'Access-Control-Allow-Origin' '*';
		# add_header 'Cross-Origin-Opener-Policy' 'same-origin';
		# add_header 'Cross-Origin-Embedder-Policy' 'require-corp';
        # add_header 'Cross-Origin-Resource-Policy' 'false';
    }

	#App Web App Path Mappings 設定 Azure File Share Mount Path = /usr/share/nginx/uploads
    location /uploads/ {
        root   /usr/share/nginx/;
        try_files $uri $uri/ /index.html;
    }

	#防止存取隱藏檔案
	location ~ /\. {
        return 404; 
    }
	location /BitKeeper {
        return 404; 
    }

    #error_page  404              /;
	# To allow POST on static pages
    error_page 404 403 405 =301 https://longchamp-2026cny-website-prod.azurewebsites.net;
    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}
